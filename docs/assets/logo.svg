<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background pill -->
  <rect rx="16" ry="16" width="480" height="120" fill="url(#bg)"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="120" rx="3" fill="url(#accent)"/>
  <!-- Icon: circuit node -->
  <circle cx="54" cy="60" r="22" fill="none" stroke="url(#accent)" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="54" cy="60" r="7" fill="url(#accent)" filter="url(#glow)"/>
  <line x1="54" y1="38" x2="54" y2="30" stroke="#6366f1" stroke-width="2"/>
  <line x1="54" y1="82" x2="54" y2="90" stroke="#06b6d4" stroke-width="2"/>
  <line x1="76" y1="60" x2="84" y2="60" stroke="#8b5cf6" stroke-width="2"/>
  <line x1="32" y1="60" x2="24" y2="60" stroke="#6366f1" stroke-width="2"/>
  <circle cx="54" cy="30" r="3" fill="#6366f1"/>
  <circle cx="54" cy="90" r="3" fill="#06b6d4"/>
  <circle cx="84" cy="60" r="3" fill="#8b5cf6"/>
  <circle cx="24" cy="60" r="3" fill="#6366f1"/>
  <!-- Title -->
  <text x="104" y="50" font-family="'SF Mono', 'Fira Code', monospace" font-size="22" font-weight="700" fill="white" letter-spacing="-0.5">test-end-to-end</text>
  <text x="106" y="74" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="url(#accent)" letter-spacing="2">V-INFINITE  ·  MCP ENGINE</text>
  <!-- Tagline -->
  <text x="104" y="98" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">Autonomous QA · Zero-Prompt · Claude Code</text>
</svg>
